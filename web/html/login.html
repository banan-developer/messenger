<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход в систему — ГУАП</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bulma/0.9.4/css/bulma.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../static/css/auth.css">
</head>
<body>

  <div class="auth-shell">
    <div class="auth-container">
      
      <!-- Логотип портала -->
      <div class="auth-brand">
        <span class="logo-icon"><i class="fas fa-satellite"></i></span>
        <span class="logo-text">ГУАП</span>
      </div>

      <div class="card auth-card">
        <h1 class="auth-title">Авторизация</h1>
        <p class="auth-subtitle">Войдите, чтобы перейти в свой профиль</p>

        <!-- Блок для отображения ошибки от бэкенда при неверном логине/пароле -->
        <!-- Пример для Jinja2 / Thymeleaf: -->
        <!-- {% if error %} -->
        <!-- <div class="form-error-banner"><i class="fas fa-circle-exclamation"></i> {{ error }}</div> -->
        <!-- {% endif %} -->

        <form action="/login" method="POST" enctype="application/x-www-form-urlencoded">
          
          <!-- Поле email (в интерфейсе подписано как "Логин:") -->
          <div class="field">
            <label class="label" for="email">Логин:</label>
            <div class="control has-icons-left">
              <input class="input" type="email" id="email" name="email" placeholder="name@guap.ru" required />
              <span class="icon is-small is-left">
                <i class="fas fa-envelope"></i>
              </span>
            </div>
          </div>

          <!-- Поле пароля -->
          <div class="field">
            <label class="label" for="password">Пароль:</label>
            <div class="control has-icons-left">
              <input class="input" type="password" id="password" name="password" placeholder="Введите ваш пароль" required />
              <span class="icon is-small is-left">
                <i class="fas fa-lock"></i>
              </span>
            </div>
          </div>

          <!-- Кнопки отправки и сброса формы -->
          <div class="auth-actions">
            <button type="submit" class="btn btn-primary">Войти</button>
            <button type="reset" class="btn btn-ghost">Отменить</button>
          </div>

        </form>
      </div>

      <!-- Навигация на страницу регистрации -->
      <div class="auth-footer">
        Нет аккаунта? <a href="/registration" class="auth-link">Зарегистрироваться</a>
      </div>

    </div>
  </div>

</body>
</html>
