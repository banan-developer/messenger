<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Друзья</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
    <link rel="stylesheet" type="text/css" href="../static/css/app.css" />
    <link rel="icon" href="../static/uploads/images/favicon-16x16.png" type="image/x-icon">
</head>
<body>
    <div id="FRIENDS" class="app-layout">
        <app-sidebar
            active="friends"
            :user-name="userName"
            :user-avatar="userAvatar"
            @logout="exitFromAccount">
        </app-sidebar>

        <main class="app-content">
            <div class="page-body">
                <h1 class="title is-4">Друзья</h1>

                <div class="tabs friends-tabs">
                    <ul>
                        <li :class="{ 'is-active': activeTab === 'all' }">
                            <a @click="activeTab = 'all'">Все друзья</a>
                        </li>
                        <li :class="{ 'is-active': activeTab === 'requests' }">
                            <a @click="activeTab = 'requests'">Заявки ({{ requests.length }})</a>
                        </li>
                    </ul>
                </div>

                <div class="control has-icons-left friends-search">
                    <input class="input" type="text" placeholder="Поиск друзей..." v-model="searchQuery">
                    <span class="icon is-left">🔍</span>
                </div>

                <ul v-if="activeTab === 'all'" class="friend-list">
                    <li v-for="friend in filteredFriends" :key="friend.id" class="friend-item">
                        <div class="avatar-circle">
                            <img :src="friend.avatar" width="25" alt="фото друга"/>
                        </div>
                        <div class="friend-info">
                            <div class="friend-name">{{ friend.name }}</div>
                            <div class="friend-status">{{ friend.status }}</div>
                        </div>
                        <button class="button is-white icon-btn" @click="openChatWith(friend)">💬</button>
                        <div class="friend-menu-wrap">
                            <button class="button is-white icon-btn" @click="toggleMenu(friend.id)">⋮</button>
                            <div v-if="openMenuId === friend.id" class="friend-menu">
                                <a class="friend-menu-item" @click="toggleMenu(null)">Написать сообщение</a>
                                <a class="friend-menu-item is-danger" @click="toggleMenu(null)">Удалить из друзей</a>
                            </div>
                        </div>
                    </li>
                    <li v-if="filteredFriends.length === 0" class="chat-empty">Ничего не найдено</li>
                </ul>

                <ul v-if="activeTab === 'requests'" class="friend-list">
                    <li v-for="req in requests" :key="req.id" class="friend-item">
                        <div class="avatar-circle">
                             <img :src="req.avatar" width="25" alt="фото друга"/>
                        </div>
                        <div class="friend-info">
                            <div class="friend-name">{{ req.name }}</div>
                        </div>
                        <button class="button is-primary is-small" @click="SetAcceptStatus(req.id)">Принять</button>
                        <button class="button is-white is-small">Отклонить</button>
                    </li>
                    <li v-if="requests.length === 0" class="chat-empty">Заявок нет</li>
                </ul>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="/js/components/sidebar.js"></script>
    <script src="/js/friends.js"></script>
</body>
</html>
