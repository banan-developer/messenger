<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Регистрация — ГУАП</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bulma/0.9.4/css/bulma.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../static/css/auth.css">
</head>
<body>

  <div class="auth-shell">
    <div class="auth-container">
      
      <!-- Логотип портала -->
      <div class="auth-brand">
        <img src="../static/icons/guap.svg" width="36" height="36" >
        <span class="logo-text">ГУАП</span>
      </div>

      <div class="card auth-card">
        <h1 class="auth-title">Регистрация</h1>
        <p class="auth-subtitle">Создайте учетную запись в системе</p>

        <!-- Блок для отображения ошибок валидации на бэкенде -->
        <!-- {% if error %} -->
        <!-- <div class="form-error-banner"><i class="fas fa-circle-exclamation"></i> {{ error }}</div> -->
        <!-- {% endif %} -->

        <form action="/registration" method="POST" enctype="application/x-www-form-urlencoded">
          
          <!-- Имя / ФИО -->
          <div class="field">
            <label class="label" for="name">Имя пользователя / ФИО</label>
            <div class="control has-icons-left">
              <input class="input" type="text" id="name" name="name" placeholder="Иванов Иван Иванович" required />
              <span class="icon is-small is-left">
                <i class="fas fa-user"></i>
              </span>
            </div>
          </div>

          <!-- Электронная почта -->
          <div class="field">
            <label class="label" for="email">Электронная почта</label>
            <div class="control has-icons-left">
              <input class="input" type="email" id="email" name="email" placeholder="name@guap.ru" required />
              <span class="icon is-small is-left">
                <i class="fas fa-envelope"></i>
              </span>
            </div>
          </div>

          <!-- Пароль -->
          <div class="field">
            <label class="label" for="password">Пароль</label>
            <div class="control has-icons-left">
              <input class="input" type="password" id="password" name="password" placeholder="Придумайте надежный пароль" required />
              <span class="icon is-small is-left">
                <i class="fas fa-lock"></i>
              </span>
            </div>
          </div>

          <!-- Пол (Radio кнопки) -->
          <div class="field">
            <label class="label" for="group">Учебная группа</label>
            <div class="control has-icons-left">
              <input class="input" type="text" id="group" name="group" placeholder="Например, 1442" maxlength="45" required />
              <span class="icon is-small is-left"><i class="fas fa-user-group"></i></span>
            </div>
          </div>

          <!-- Пол (Radio кнопки) -->
          <div class="field">
            <label class="label">Пол</label>
            <div class="control sex-radio-group">
              <label class="radio custom-radio">
                <input type="radio" name="sex" value="Мужской" required />
                <span><i class="fas fa-mars"></i> Мужской</span>
              </label>
              <label class="radio custom-radio">
                <input type="radio" name="sex" value="Женский" required />
                <span><i class="fas fa-venus"></i> Женский</span>
              </label>
            </div>
          </div>

          <!-- Кнопки отправки и сброса -->
          <div class="auth-actions">
            <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
            <button type="reset" class="btn btn-ghost">Отмена</button>
          </div>

        </form>
      </div>

      <!-- Ссылка возврата -->
      <div class="auth-footer">
        <p>Проект разработан студентами ГУАП в рамках учебной практики. Не является официальным сервисом университета.</p>
        <a href="/login" class="auth-link"><i class="fas fa-arrow-left"></i> Вернуться обратно</a>
      </div>

    </div>
  </div>

</body>
</html>
