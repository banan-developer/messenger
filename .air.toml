root = "."
tmp_dir = "tmp"

[build]
  # Команда сборки вашего Go-сервера
  cmd = "go build -o ./tmp/main ./cmd/server"
  # Запуск собранного бинарника
  bin = "./tmp/main"
  # За какими расширениями файлов следить для перезагрузки бэкенда
  include_ext = ["go", "mod", "sum"]
  # Игнорировать папки (особенно загрузки картинок из фронта, чтобы сервер не рестартился)
  exclude_dir = ["tmp", "vendor", "web/static/uploads", "db"]
  # Задержка перед пересборкой (в миллисекундах)
  delay = 500
  # Остановливать старый процесс при ошибке сборки нового
  stop_on_error = true
  # Очищать консоль при каждом рестарте
  clear_on_rebuild = true

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"