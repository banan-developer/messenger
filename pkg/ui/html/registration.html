<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link rel="stylesheet" type="text/css" href="../static/style_for_auth.css" />
</head>
<body>
    <div id="div_reg">
        <h2>Добро пожаловать на THE NOMAX</h2>
        <h2>Регистрация</h2>
        <form method="POST" action="/register">
            <p>
                <label for="name">Имя пользователя</label>
                <input type="text" name="name" placeholder="Введите ФИО" autocomplete="on" required id="email" /> 
            </p>

            <p>
                <label for="email">Почта</label>
                <input type="email" name="email" placeholder="Введите email" autocomplete="on" required id="email" /> 
            </p>

            <p>
                <label for="email">Пароль</label>
                <input type="password" name="password" placeholder="Введите пароль" required id="password" />
            </p>

            <p>
                <p>Пол:</p>

                <label>
                    <input type="radio" name="sex" value="Мужской" required>
                    Мужской
                </label>

                <label>
                    <input type="radio" name="sex" value="Женский">
                    Женский
                </label>

                <label>
                    <input type="radio" name="sex" value="Гофер">
                    Гофер
                </label>
            </p>

            <p>
                <button type="submit" >Отправить</button>
                <button type="reset">Отмена</button>
            </p>

            <p>
                <span><a href="/">Вернуться обратно</a></span>
            </p>

    </div>

     
</body>
</html>
